experiment_name: "free_rider"
model: "resnet18"
dataset: "cifar10"
num_clients: 10
num_rounds: 100
local_epochs: 5
batch_size: 16
learning_rate: 0.01
watermark_lambda: 0.1
memory_mu: 0.01
trigger_sample_count: 50
alpha: 0.5
free_rider_ratio: 0.2  # 20% free riders
free_rider_strategy: "previous_models"  # or "gaussian_noise", "train_then_attack", "trigger_only"
attack_round: 50  # for train_then_attack
trigger_train_samples: 0  # for trigger_only
seed: 42